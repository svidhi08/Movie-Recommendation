<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MovieSphere | Smart Recommendations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top center, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 flex items-center justify-center p-4">

<div class="max-w-2xl w-full">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-white mb-2 tracking-tight">Movie<span class="text-blue-500">Sphere</span></h1>
        <p class="text-slate-400 text-lg">Hybrid AI Recommendation System (Content + Collaborative)</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500 text-red-200 p-4 rounded-lg mb-6 text-center">
        {{ error }}
    </div>
    {% endif %}

    <form action="/recommend" method="POST" class="glass p-8 rounded-3xl shadow-2xl">
        <label class="block text-sm font-medium mb-2 text-slate-400">Search for a movie you love:</label>
        <input
            list="movie-options"
            name="movie_name"
            class="w-full bg-slate-800 border-slate-700 rounded-xl py-4 px-6 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            placeholder="e.g. Toy Story, Inception..."
            required
        />
        <datalist id="movie-options">
            {% for movie in suggestions %}
            <option value="{{ movie }}"></option>
            {% endfor %}
        </datalist>

        <!-- User ID input added here -->
        <label class="block text-sm font-medium mt-6 mb-2 text-slate-400">Enter your User ID (for personalized recommendations):</label>
        <input
            type="number"
            name="user_id"
            min="1"
            class="w-full bg-slate-800 border-slate-700 rounded-xl py-4 px-6 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            placeholder="e.g. 1"
            value="1"
            required
        />

        <button type="submit" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
            Show Recommendations
        </button>
    </form>
</div>

</body>
</html>
